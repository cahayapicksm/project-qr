<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Generator Link QR Motor</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen">
  <main class="max-w-5xl mx-auto p-4">
    <h1 class="text-2xl font-bold mb-2">
      Generator Link QR Motor
    </h1>

    <p class="text-gray-600 mb-4">
      Masukkan domain Vercel kamu, lalu sistem akan membuat semua link motor otomatis.
    </p>

    <div class="bg-white p-4 rounded-xl shadow mb-4">
      <label class="font-semibold block mb-2">
        Domain Vercel
      </label>

      <input 
        id="domainInput"
        type="text"
        placeholder="https://honda-linktree.vercel.app"
        class="w-full border p-3 rounded-xl mb-3"
      />

      <button 
        id="generateBtn"
        class="bg-red-600 text-white px-4 py-3 rounded-xl font-bold"
      >
        Buat Link
      </button>
    </div>

    <div class="bg-white p-4 rounded-xl shadow overflow-x-auto">
      <table class="w-full text-sm border">
        <thead class="bg-gray-200">
          <tr>
            <th class="p-2 border text-left">ID</th>
            <th class="p-2 border text-left">Motor</th>
            <th class="p-2 border text-left">Link QR</th>
            <th class="p-2 border text-left">Copy</th>
          </tr>
        </thead>

        <tbody id="linkTable"></tbody>
      </table>
    </div>
  </main>

  <script type="module">
    import { MOTORS } from "./assets/js/motor-data.js";

    const domainInput = document.getElementById("domainInput");
    const generateBtn = document.getElementById("generateBtn");
    const linkTable = document.getElementById("linkTable");

    generateBtn.addEventListener("click", generateLinks);

    function generateLinks() {
      let domain = domainInput.value.trim();

      if (!domain) {
        alert("Masukkan domain Vercel dulu.");
        return;
      }

      if (domain.endsWith("/")) {
        domain = domain.slice(0, -1);
      }

      linkTable.innerHTML = "";

      MOTORS.forEach((motor) => {
        const link = `${domain}/motor.html?id=${motor.id}`;

        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td class="p-2 border">${motor.id}</td>
          <td class="p-2 border font-semibold">${motor.name}</td>
          <td class="p-2 border">
            <a href="${link}" target="_blank" class="text-blue-600 underline">
              ${link}
            </a>
          </td>
          <td class="p-2 border">
            <button 
              class="copy-btn bg-gray-800 text-white px-3 py-2 rounded-lg"
              data-link="${link}"
            >
              Copy
            </button>
          </td>
        `;

        linkTable.appendChild(tr);
      });

      document.querySelectorAll(".copy-btn").forEach((button) => {
        button.addEventListener("click", async () => {
          const link = button.dataset.link;
          await navigator.clipboard.writeText(link);
          alert("Link berhasil dicopy.");
        });
      });
    }
  </script>
</body>
</html>
