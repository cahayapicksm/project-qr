<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Honda QR Link</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-red-50 min-h-screen">
  <main class="max-w-3xl mx-auto p-4">
    <h1 class="text-2xl font-bold mb-2">
      Honda QR Link
    </h1>

    <p class="text-gray-600 mb-4">
      Pilih motor untuk testing halaman QR.
    </p>

    <div id="motorList" class="grid gap-3"></div>
  </main>

  <script type="module">
    import { MOTORS } from "./assets/js/motor-data.js";

    const motorList = document.getElementById("motorList");

    MOTORS.forEach((motor) => {
      const a = document.createElement("a");

      a.href = `motor.html?unit=${motor.id}`;
      a.className = "block bg-white p-4 rounded-xl shadow font-semibold";

      a.textContent = motor.name;

      motorList.appendChild(a);
    });
  </script>
</body>
</html>
