<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Admin QR Generator</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen">
  <main class="max-w-6xl mx-auto p-4">

    <h1 class="text-2xl font-bold mb-4">
      Admin QR Generator
    </h1>

    <!-- LOGIN SECTION -->
    <section id="loginSection" class="bg-white rounded-xl shadow p-4 max-w-md">
      <h2 class="text-lg font-bold mb-3">
        Login Admin
      </h2>

      <form id="loginForm" class="space-y-3">
        <input 
          id="emailInput"
          type="email"
          placeholder="Email Admin"
          required
          class="w-full border rounded-xl p-3"
        />

        <input 
          id="passwordInput"
          type="password"
          placeholder="Password"
          required
          class="w-full border rounded-xl p-3"
        />

        <button 
          type="submit"
          class="w-full bg-red-600 text-white font-bold py-3 rounded-xl"
        >
          Login
        </button>
      </form>

      <p id="loginMessage" class="text-sm text-red-600 mt-3"></p>
    </section>

    <!-- QR SECTION -->
    <section id="qrSection" class="hidden">
      <div class="bg-white rounded-xl shadow p-4 mb-5">
        <div class="flex justify-between items-center mb-4">
          <div>
            <h2 class="text-lg font-bold">
              Generate QR Motor
            </h2>
            <p class="text-sm text-gray-500">
              Halaman ini hanya bisa dibuka setelah login admin.
            </p>
          </div>

          <button 
            id="logoutBtn"
            class="bg-gray-800 text-white px-4 py-2 rounded-xl font-bold"
          >
            Logout
          </button>
        </div>

        <label class="font-semibold block mb-2">
          Domain Vercel
        </label>

        <input 
          id="domainInput"
          type="text"
          value="https://project-qr-beta.vercel.app"
          class="w-full border rounded-xl p-3 mb-3"
        />

        <button 
          id="generateBtn"
          class="bg-red-600 text-white font-bold px-4 py-3 rounded-xl"
        >
          Buat QR
        </button>
      </div>

      <div 
        id="qrList" 
        class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"
      ></div>
    </section>

  </main>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
    import { SUPABASE_URL, SUPABASE_ANON_KEY } from "./assets/js/config.js";
    import { MOTORS } from "./assets/js/motor-data.js";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const loginSection = document.getElementById("loginSection");
    const qrSection = document.getElementById("qrSection");

    const loginForm = document.getElementById("loginForm");
    const emailInput = document.getElementById("emailInput");
    const passwordInput = document.getElementById("passwordInput");
    const loginMessage = document.getElementById("loginMessage");

    const logoutBtn = document.getElementById("logoutBtn");
    const domainInput = document.getElementById("domainInput");
    const generateBtn = document.getElementById("generateBtn");
    const qrList = document.getElementById("qrList");

    checkLoginStatus();

    async function checkLoginStatus() {
      const { data } = await supabase.auth.getSession();

      if (data.session) {
        showQrPage();
      } else {
        showLoginPage();
      }
    }

    loginForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      loginMessage.textContent = "";

      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();

      const { error } = await supabase.auth.signInWithPassword({
        email: email,
        password: password
      });

      if (error) {
        loginMessage.textContent = "Login gagal. Periksa email dan password.";
        return;
      }

      showQrPage();
    });

    logoutBtn.addEventListener("click", async () => {
      await supabase.auth.signOut();
      showLoginPage();
    });

    generateBtn.addEventListener("click", generateQR);

    function showLoginPage() {
      loginSection.classList.remove("hidden");
      qrSection.classList.add("hidden");
    }

    function showQrPage() {
      loginSection.classList.add("hidden");
      qrSection.classList.remove("hidden");
    }

    function generateQR() {
      let domain = domainInput.value.trim();

      if (!domain) {
        alert("Masukkan domain Vercel dulu.");
        return;
      }

      if (domain.endsWith("/")) {
        domain = domain.slice(0, -1);
      }

      qrList.innerHTML = "";

      MOTORS.forEach((motor) => {
        const link = `${domain}/motor.html?id=${motor.id}`;
        const qrImage = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(link)}`;

        const card = document.createElement("div");

        card.className = "bg-white rounded-xl shadow p-4 text-center";

        card.innerHTML = `
          <h2 class="font-bold text-lg mb-1">${motor.name}</h2>
          <p class="text-sm text-gray-500 mb-3">ID: ${motor.id}</p>

          <img 
            src="${qrImage}" 
            alt="QR ${motor.name}" 
            class="mx-auto mb-3"
          />

          <p class="text-xs break-all text-gray-600 mb-3">${link}</p>

          <a 
            href="${qrImage}" 
            download="qr-${motor.slug}.png"
            class="block bg-red-600 text-white font-bold py-2 rounded-lg mb-2"
          >
            Download QR
          </a>

          <button 
            class="copy-btn bg-gray-800 text-white font-bold py-2 rounded-lg w-full"
            data-link="${link}"
          >
            Copy Link
          </button>
        `;

        qrList.appendChild(card);
      });

      document.querySelectorAll(".copy-btn").forEach((button) => {
        button.addEventListener("click", async () => {
          await navigator.clipboard.writeText(button.dataset.link);
          alert("Link berhasil dicopy.");
        });
      });
    }
  </script>
</body>
</html>
